name: Build Minecraft Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - name: Build mod
      run: ./gradlew build

    - name: Upload jar
      uses: actions/upload-artifact@v4
      with:
        name: minecraft-mod
        path: build/libs/*.jar
